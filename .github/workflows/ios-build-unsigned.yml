name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Show Xcode info
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies             -workspace App.xcworkspace             -scheme mRayon

      - name: Build unsigned iOS app
        run: |
          set -o pipefail
          xcodebuild build             -workspace App.xcworkspace             -scheme mRayon             -configuration Release             -destination 'generic/platform=iOS'             -derivedDataPath build             CODE_SIGN_IDENTITY=''             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO             DEVELOPMENT_TEAM=''             2>&1 | tee /tmp/xcodebuild.log

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/Build/Products -path '*Release-iphoneos/*.app' | head -1)
          if [ -z "$APP_PATH" ]; then
            echo 'No .app found'
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH" .app)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "${APP_NAME}.ipa" Payload
          ls -lh "${APP_NAME}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayon-ios-unsigned-ipa
          path: '*.ipa'
          retention-days: 7
